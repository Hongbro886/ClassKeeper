name: build exe

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.14'

    - name: Install deps
      run: pip install pyinstaller psutil

    - name: Build exe
      run: pyinstaller -F -w main.py

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: exe
        path: dist/*.exe